# kube-prometheus-stack Helm values — sanitized template
# Full values reference: https://github.com/prometheus-community/helm-charts

grafana:
  adminPassword: <REPLACE_ME>

  ingress:
    enabled: true
    ingressClassName: kong
    hosts:
      - grafana.<YOUR_DOMAIN>
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.<YOUR_DOMAIN>

  # OIDC with Authentik
  grafana.ini:
    server:
      domain: grafana.<YOUR_DOMAIN>
      root_url: https://grafana.<YOUR_DOMAIN>
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      client_id: <AUTHENTIK_CLIENT_ID>
      client_secret: <AUTHENTIK_CLIENT_SECRET>
      scopes: openid email profile
      auth_url: https://auth.<YOUR_DOMAIN>/application/o/authorize/
      token_url: https://auth.<YOUR_DOMAIN>/application/o/token/
      api_url: https://auth.<YOUR_DOMAIN>/application/o/userinfo/

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi
