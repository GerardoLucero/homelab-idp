apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: homelab-kafka
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: homelab-kafka-kafka-bootstrap.kafka.svc:9092
            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: http://apicurio-registry.kafka.svc:8080/apis/ccompat/v6
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
              value: debezium-connect
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
              value: http://debezium-connect-connect-api.kafka.svc:8083
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: kafka
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka-ui
  namespace: kafka
  annotations:
    kubernetes.io/ingress.class: kong
spec:
  rules:
    - host: kafka.home.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
