# KafkaConnector — Debezium CDC desde PostgreSQL demo
# Aplicar DESPUÉS de que KafkaConnect esté en estado Ready
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: postgres-demo-cdc
  namespace: kafka
  labels:
    strimzi.io/cluster: debezium-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    # Conexión a PostgreSQL
    database.hostname: postgres-demo.kafka.svc
    database.port: "5432"
    database.user: debezium
    database.password: "<REPLACE_ME>"
    database.dbname: demo
    database.server.name: homelab-postgres

    # Logical replication slot
    plugin.name: pgoutput
    slot.name: debezium_slot
    publication.name: debezium_pub

    # Tablas a capturar
    table.include.list: public.orders

    # Formato de topics: <server>.<schema>.<table>
    topic.prefix: homelab-postgres

    # Usa JSON (default del cluster — no requiere Avro/Schema Registry)
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "true"
    value.converter.schemas.enable: "true"

    # Snapshot inicial
    snapshot.mode: initial

    # Heartbeat para mantener el replication slot activo
    heartbeat.interval.ms: "30000"

    # Incluir metadatos de transacción
    provide.transaction.metadata: "true"
