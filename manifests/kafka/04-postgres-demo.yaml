# PostgreSQL con logical replication habilitado para demo de Debezium CDC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-demo
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-demo
  template:
    metadata:
      labels:
        app: postgres-demo
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: demo
            - name: POSTGRES_USER
              value: debezium
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-demo-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=4
            - -c
            - max_wal_senders=4
          resources:
            requests:
              memory: 256Mi
              cpu: "250m"
            limits:
              memory: 512Mi
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-demo-pvc
        - name: init-scripts
          configMap:
            name: postgres-demo-init
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-demo-secret
  namespace: kafka
type: Opaque
stringData:
  password: "<REPLACE_ME>"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-demo-pvc
  namespace: kafka
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-demo-init
  namespace: kafka
data:
  01-init.sql: |
    -- Crear tabla de demo para CDC
    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      customer_name VARCHAR(100) NOT NULL,
      product VARCHAR(100) NOT NULL,
      quantity INT NOT NULL,
      total_amount DECIMAL(10,2) NOT NULL,
      status VARCHAR(20) DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT NOW(),
      updated_at TIMESTAMP DEFAULT NOW()
    );

    -- Habilitar replica identity para full CDC
    ALTER TABLE orders REPLICA IDENTITY FULL;

    -- Datos de demo
    INSERT INTO orders (customer_name, product, quantity, total_amount)
    VALUES
      ('Alice Johnson', 'MacBook Pro', 1, 2499.00),
      ('Bob Smith', 'iPhone 15', 2, 1998.00),
      ('Carlos Mendez', 'AirPods Pro', 3, 749.97);

    -- Publicación para Debezium (logical replication)
    CREATE PUBLICATION debezium_pub FOR TABLE orders;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-demo
  namespace: kafka
spec:
  selector:
    app: postgres-demo
  ports:
    - port: 5432
      targetPort: 5432
